name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  KERNEL_VERSION: "6.1.155"

jobs:
  binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Build bhatti (all platforms)
        run: make release

      - name: Build lohar (linux amd64 + arm64)
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/lohar-linux-amd64 ./cmd/lohar/
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/lohar-linux-arm64 ./cmd/lohar/

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: binaries
          path: dist/*

  release:
    name: Create Release
    needs: [binaries]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts

      - name: Collect artifacts and generate checksums
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          cd release
          sha256sum * > checksums-sha256.txt
          echo "=== Release artifacts ==="
          ls -lh
          echo ""
          echo "=== SHA256 checksums ==="
          cat checksums-sha256.txt

      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: release/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          # Immutable releases lock assets after publication. Standard
          # releases upload before publishing (fine). But prereleases
          # publish immediately, so assets can't be uploaded after.
          # Draft only for pre-releases — publish manually from GitHub UI.
          draft: ${{ contains(github.ref_name, '-rc') }}
