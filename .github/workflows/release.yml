name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need tags for version bump

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Determine next version
        id: version
        run: |
          # Get latest tag, default to v0.0.0 if none
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest=$LATEST"

          # Bump minor: v0.1.0 → v0.2.0
          MAJOR=$(echo "$LATEST" | cut -d. -f1)
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          NEXT="${MAJOR}.$((MINOR + 1)).0"
          echo "next=$NEXT"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # bhatti (host daemon + CLI)
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/bhatti-linux-arm64 ./cmd/bhatti/
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/bhatti-linux-amd64 ./cmd/bhatti/

          # lohar (guest agent)
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/lohar-linux-arm64 ./cmd/lohar/
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/lohar-linux-amd64 ./cmd/lohar/

          # build-rootfs.sh
          cp scripts/build-rootfs.sh dist/build-rootfs.sh

          ls -lh dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git tag "$VERSION"
          git push origin "$VERSION"

          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            dist/bhatti-linux-arm64 \
            dist/bhatti-linux-amd64 \
            dist/lohar-linux-arm64 \
            dist/lohar-linux-amd64 \
            dist/build-rootfs.sh
